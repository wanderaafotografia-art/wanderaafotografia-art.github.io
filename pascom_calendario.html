<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala PASCOM 2026</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #eef5ff, #ffffff);
  color: #13233a;
}

header {
  background: linear-gradient(135deg, #003b73, #0077c8);
  color: white;
  padding: 35px 20px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 34px;
}

header p {
  margin-top: 10px;
  font-size: 17px;
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 18px;
}

.mes {
  margin-bottom: 35px;
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 8px 25px rgba(0,0,0,0.10);
}

.mes-titulo {
  padding: 18px 25px;
  color: white;
  font-size: 26px;
  font-weight: bold;
}

.grid-eventos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
  padding: 22px;
}

.card {
  border: 1px solid #e3e8f0;
  border-radius: 16px;
  padding: 18px;
  background: #ffffff;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.10);
}

.card.destaque {
  border: 2px solid #d4a017;
  background: #fff8e6;
}

.data {
  font-size: 15px;
  font-weight: bold;
  color: #0077c8;
}

.nome {
  margin: 8px 0 14px;
  font-size: 19px;
  font-weight: bold;
}

.checkbox {
  background: #f2f6fb;
  padding: 10px;
  border-radius: 10px;
  font-weight: 600;
}

.equipe {
  display: none;
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  background: #eef6ff;
}

.equipe input {
  width: 100%;
  margin: 6px 0 12px;
  padding: 10px;
  border-radius: 9px;
  border: 1px solid #cfd8e3;
}

label {
  font-size: 14px;
}

.foto { color: #005fa3; font-weight: bold; }
.video { color: #c5222a; font-weight: bold; }

button {
  display: block;
  width: 100%;
  max-width: 420px;
  margin: 35px auto;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #003b73, #0077c8);
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#relatorio {
  display: none;
  background: white;
  margin-top: 35px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

#relatorio h2 {
  color: #003b73;
}

.item-relatorio {
  border-bottom: 1px solid #ddd;
  padding: 15px 0;
}

.jan { background: #e6a600; }
.fev { background: #0077c8; }
.mar { background: #3ca34d; }
.abr { background: #d63434; }
.mai { background: #d89b00; }
.jun { background: #008bd2; }
.jul { background: #2e944b; }
.ago { background: #c92c2c; }
.set { background: #c89b00; }
.out { background: #006eb6; }
.nov { background: #3c9f42; }
.dez { background: #c5222a; }
</style>
</head>

<body>

<header>
  <h1>Escala de Eventos PASCOM 2026</h1>
  <p>Organização dos domingos, festas e equipes de cobertura</p>
</header>

<div class="container" id="app"></div>

<button onclick="gerarRelatorio()">Gerar Relatório dos Eventos Selecionados</button>

<div class="container">
  <div id="relatorio">
    <h2>Relatório para Preenchimento dos Participantes</h2>
    <div id="conteudoRelatorio"></div>
  </div>
</div>

<script>
const meses = [
  { nome: "Janeiro", classe: "jan", eventos: [
    ["04/01", "Domingo"],
    ["11/01", "Domingo"],
    ["18/01", "Domingo"],
    ["25/01", "Domingo"]
  ]},
  { nome: "Fevereiro", classe: "fev", eventos: [
    ["01/02", "Domingo"],
    ["08/02", "Domingo"],
    ["15/02", "Domingo"],
    ["22/02", "Domingo"]
  ]},
  { nome: "Março", classe: "mar", eventos: [
    ["01/03", "Domingo"],
    ["08/03", "Domingo"],
    ["15/03", "Domingo"],
    ["22/03", "Domingo"],
    ["29/03", "Domingo"]
  ]},
  { nome: "Abril", classe: "abr", eventos: [
    ["05/04", "Domingo"],
    ["12/04", "Domingo"],
    ["19/04", "Domingo"],
    ["26/04", "Domingo"]
  ]},
  { nome: "Maio", classe: "mai", eventos: [
    ["03/05", "Domingo"],
    ["10/05", "Domingo"],
    ["17/05", "Domingo"],
    ["22/05", "Festa de Santa Rita", true],
    ["24/05", "Domingo"],
    ["31/05", "Domingo"]
  ]},
  { nome: "Junho", classe: "jun", eventos: [
    ["07/06", "Domingo"],
    ["14/06", "Domingo"],
    ["21/06", "Domingo"],
    ["28/06", "Domingo"]
  ]},
  { nome: "Julho", classe: "jul", eventos: [
    ["05/07", "Domingo"],
    ["12/07", "Domingo"],
    ["19/07", "Domingo"],
    ["26/07", "Domingo"]
  ]},
  { nome: "Agosto", classe: "ago", eventos: [
    ["02/08", "Domingo"],
    ["09/08", "Domingo"],
    ["16/08", "Domingo"],
    ["23/08", "Domingo"],
    ["30/08", "Domingo"]
  ]},
  { nome: "Setembro", classe: "set", eventos: [
    ["06/09", "Domingo"],
    ["13/09", "Domingo"],
    ["20/09", "Domingo"],
    ["27/09", "Domingo"]
  ]},
  { nome: "Outubro", classe: "out", eventos: [
    ["04/10", "Domingo"],
    ["11/10", "Domingo"],
    ["18/10", "Domingo"],
    ["25/10", "Domingo"]
  ]},
  { nome: "Novembro", classe: "nov", eventos: [
    ["01/11", "Domingo"],
    ["08/11", "Domingo"],
    ["15/11", "Domingo"],
    ["16/11", "Dia de Santa Gertrudes", true],
    ["22/11", "Domingo"],
    ["29/11", "Domingo"]
  ]},
  { nome: "Dezembro", classe: "dez", eventos: [
    ["06/12", "Domingo"],
    ["13/12", "Domingo"],
    ["20/12", "Domingo"],
    ["27/12", "Domingo"]
  ]}
];

const app = document.getElementById("app");

meses.forEach((mes, i) => {
  let html = `
    <section class="mes">
      <div class="mes-titulo ${mes.classe}">${mes.nome}</div>
      <div class="grid-eventos">
  `;

  mes.eventos.forEach((ev, j) => {
    const id = `m${i}e${j}`;
    html += `
      <div class="card ${ev[2] ? 'destaque' : ''}">
        <div class="data">${ev[0]}</div>
        <div class="nome">${ev[1]}</div>

        <div class="checkbox">
          <label>
            <input type="checkbox" onchange="abrirEquipe('${id}', this)">
            A PASCOM irá atuar?
          </label>
        </div>

        <div class="equipe" id="${id}">
          <label class="foto">Fotógrafo 1</label>
          <input type="text" placeholder="Nome do fotógrafo 1">

          <label class="foto">Fotógrafo 2</label>
          <input type="text" placeholder="Nome do fotógrafo 2">

          <label class="video">Videomaker 1</label>
          <input type="text" placeholder="Nome do videomaker 1">

          <label class="video">Videomaker 2</label>
          <input type="text" placeholder="Nome do videomaker 2">
        </div>
      </div>
    `;
  });

  html += `</div></section>`;
  app.innerHTML += html;
});

function abrirEquipe(id, checkbox) {
  document.getElementById(id).style.display = checkbox.checked ? "block" : "none";
}

function gerarRelatorio() {
  const cards = document.querySelectorAll(".card");
  const relatorio = document.getElementById("relatorio");
  const conteudo = document.getElementById("conteudoRelatorio");

  conteudo.innerHTML = "";

  cards.forEach(card => {
    const marcado = card.querySelector("input[type='checkbox']").checked;

    if (marcado) {
      const data = card.querySelector(".data").innerText;
      const nome = card.querySelector(".nome").innerText;
      const inputs = card.querySelectorAll(".equipe input");

      conteudo.innerHTML += `
        <div class="item-relatorio">
          <strong>${data} - ${nome}</strong><br><br>
          Fotógrafo 1: ${inputs[0].value || "________________________"}<br>
          Fotógrafo 2: ${inputs[1].value || "________________________"}<br>
          Videomaker 1: ${inputs[2].value || "________________________"}<br>
          Videomaker 2: ${inputs[3].value || "________________________"}
        </div>
      `;
    }
  });

  if (conteudo.innerHTML === "") {
    conteudo.innerHTML = "<p>Nenhum evento foi selecionado para atuação da PASCOM.</p>";
  }

  relatorio.style.display = "block";
  relatorio.scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
